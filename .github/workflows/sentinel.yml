name: Groww Sentinel

on:
  # GitHub cron is UTC-only. Times below = IST - 5:30. Odd minutes (not :00/:30)
  # dodge the most-contended queue slots -- GitHub silently drops scheduled runs
  # at popular round marks under load.
  schedule:
    # 09:10 IST (pre-open, NSE opens 09:15), Mon-Fri
    - cron: "40 3 * * 1-5"
    # 12:00 IST (midday), Mon-Fri
    - cron: "30 6 * * 1-5"
    # 15:15 IST (near close, NSE closes 15:30), Mon-Fri
    - cron: "45 9 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: groww-sentinel-run
  cancel-in-progress: false

# State persists via actions/cache (NOT public on public repos), never a repo
# commit -- so contents:write is gone and the portfolio never enters git.
permissions:
  contents: read

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Restore the newest state.json from a prior run. The primary key never
      # matches exactly (save keys carry a run-id suffix), so restore-keys
      # prefix-matches the most recent saved entry. First run / evicted cache
      # (>7d idle) => no file => state.load() falls back to the empty shape.
      - name: Restore state
        uses: actions/cache/restore@v6
        with:
          path: state.json
          key: groww-sentinel-state
          restore-keys: |
            groww-sentinel-state-

      - name: Run Sentinel
        run: python -m sentinel
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_TOTP_SEED: ${{ secrets.GROWW_TOTP_SEED }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        # exit code must NOT be suppressed -- a non-zero exit fails the job (NOTIFY-04/D-07)

      # Persist the mutated state under a unique key so every successful run
      # saves a fresh entry; the next run's restore-keys picks it up.
      # if: success() -- never persist state from a crashed run.
      - name: Save state
        if: success()
        uses: actions/cache/save@v6
        with:
          path: state.json
          key: groww-sentinel-state-${{ github.run_id }}-${{ github.run_attempt }}
