# Groww Sentinel portfolio tags (RULES-04, D-10).
#
# Flat symbol -> core|tactical map. "core" = long-term conviction holding
# (eligible for TRAIL WATCH / AVG CANDIDATE). "tactical" = shorter-horizon
# trade (eligible for STOP HIT / BOOK 50%). Thresholds are fixed constants in
# rules.py -- no per-symbol overrides in v1.
#
# A symbol left out of this file, or given any tag other than the two below
# (typo included), surfaces as UNTAGGED in the digest instead of guessing --
# add it here to get real flags for it.

RELIANCE: core
TCS: tactical
